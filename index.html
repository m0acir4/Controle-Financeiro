<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #efefed;
      --text: #1a1a18;
      --text2: #6b6b67;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg2: #2a2a28;
        --bg3: #333331;
        --text: #f0ede8;
        --text2: #9a9a94;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .app { max-width: 820px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 500; }
    .month-nav { display: flex; align-items: center; gap: 8px; }
    .month-nav button { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.15s; }
    .month-nav button:hover { background: var(--bg2); }
    .month-label { font-size: 15px; font-weight: 500; min-width: 160px; text-align: center; }
    .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 16px 18px; }
    .metric .label { font-size: 12px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .metric .value { font-size: 24px; font-weight: 500; }
    .value.positive { color: #1D9E75; }
    .value.negative { color: #D85A30; }
    .section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-size: 15px; font-weight: 500; }
    .add-btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.15s; }
    .add-btn:hover { background: var(--bg2); }
    .form-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .form-row input, .form-row select { flex: 1; min-width: 120px; padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); outline: none; }
    .form-row input:focus, .form-row select:focus { border-color: var(--text2); }
    .save-btn { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); padding: 8px 18px; cursor: pointer; font-size: 14px; white-space: nowrap; transition: opacity 0.15s; }
    .save-btn:hover { opacity: 0.85; }
    .item-list { display: flex; flex-direction: column; gap: 6px; }
    .item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg2); border-radius: var(--radius); font-size: 14px; }
    .item-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .item-tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .tag-receita { background: #E1F5EE; color: #0F6E56; }
    .tag-moradia { background: #E6F1FB; color: #185FA5; }
    .tag-alimentacao { background: #FAEEDA; color: #854F0B; }
    .tag-transporte { background: #EEEDFE; color: #534AB7; }
    .tag-saude { background: #FBEAF0; color: #993556; }
    .tag-lazer { background: #FCEBEB; color: #A32D2D; }
    .tag-outro { background: #F1EFE8; color: #5F5E5A; }
    .item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .item-amount { font-weight: 500; }
    .item-amount.inc { color: #1D9E75; }
    .item-amount.exp { color: #D85A30; }
    .del-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text2); padding: 0; line-height: 1; transition: color 0.15s; }
    .del-btn:hover { color: #D85A30; }
    .empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; }
    .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .chart-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; }
    .chart-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
    .chart-wrap { position: relative; width: 100%; height: 200px; }
    .hidden { display: none; }
    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr; }
      .chart-section { grid-template-columns: 1fr; }
      .metric .value { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Controle financeiro</h1>
    <div class="month-nav">
      <button id="prevMonth">&#8592;</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextMonth">&#8594;</button>
    </div>
  </div>

  <div class="summary">
    <div class="metric">
      <div class="label">Receitas</div>
      <div class="value positive" id="totalInc">R$ 0,00</div>
    </div>
    <div class="metric">
      <div class="label">Despesas</div>
      <div class="value negative" id="totalExp">R$ 0,00</div>
    </div>
    <div class="metric">
      <div class="label">Saldo do mês</div>
      <div class="value" id="totalBal">R$ 0,00</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Receitas</span>
      <button class="add-btn" id="toggleInc">+ Adicionar</button>
    </div>
    <div class="form-row hidden" id="formInc">
      <input type="text" id="incName" placeholder="Ex: Salário, Freelance..." />
      <input type="number" id="incAmount" placeholder="Valor em R$" min="0" step="0.01" />
      <button class="save-btn" id="saveInc">Salvar</button>
    </div>
    <div class="item-list" id="listInc"><div class="empty">Nenhuma receita registrada</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Despesas</span>
      <button class="add-btn" id="toggleExp">+ Adicionar</button>
    </div>
    <div class="form-row hidden" id="formExp">
      <input type="text" id="expName" placeholder="Ex: Aluguel, Mercado..." />
      <input type="number" id="expAmount" placeholder="Valor em R$" min="0" step="0.01" />
      <select id="expCat">
        <option value="moradia">Moradia</option>
        <option value="alimentacao">Alimentação</option>
        <option value="transporte">Transporte</option>
        <option value="saude">Saúde</option>
        <option value="lazer">Lazer</option>
        <option value="outro">Outro</option>
      </select>
      <button class="save-btn" id="saveExp">Salvar</button>
    </div>
    <div class="item-list" id="listExp"><div class="empty">Nenhuma despesa registrada</div></div>
  </div>

  <div class="chart-section">
    <div class="chart-box">
      <div class="chart-title">Despesas por categoria</div>
      <div class="chart-wrap"><canvas id="catChart"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Receitas vs Despesas</div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const CATS = ['moradia','alimentacao','transporte','saude','lazer','outro'];
  const CAT_LABELS = ['Moradia','Alimentação','Transporte','Saúde','Lazer','Outro'];
  const CAT_COLORS = ['#378ADD','#EF9F27','#7F77DD','#D4537E','#E24B4A','#888780'];
  const INC_COLOR = '#1D9E75';
  const EXP_COLOR = '#D85A30';

  let now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();
  let catChartInst = null, barChartInst = null;

  function key() { return `fin_${year}_${month}`; }
  function load() {
    try { return JSON.parse(localStorage.getItem(key())) || {inc:[],exp:[]}; }
    catch(e) { return {inc:[],exp:[]}; }
  }
  function save(data) { localStorage.setItem(key(), JSON.stringify(data)); }
  function fmt(n) { return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2,maximumFractionDigits:2}); }

  function render() {
    document.getElementById('monthLabel').textContent = MONTHS[month] + ' ' + year;
    const data = load();
    const totalInc = data.inc.reduce((s,i) => s + i.amount, 0);
    const totalExp = data.exp.reduce((s,i) => s + i.amount, 0);
    const bal = totalInc - totalExp;

    document.getElementById('totalInc').textContent = fmt(totalInc);
    document.getElementById('totalExp').textContent = fmt(totalExp);
    const balEl = document.getElementById('totalBal');
    balEl.textContent = fmt(bal);
    balEl.className = 'value ' + (bal > 0 ? 'positive' : bal < 0 ? 'negative' : '');

    const listInc = document.getElementById('listInc');
    listInc.innerHTML = data.inc.length === 0
      ? '<div class="empty">Nenhuma receita registrada</div>'
      : data.inc.map((it,i) => `<div class="item">
          <div class="item-left"><span class="item-tag tag-receita">receita</span><span class="item-name">${escHtml(it.name)}</span></div>
          <div class="item-right"><span class="item-amount inc">${fmt(it.amount)}</span><button class="del-btn" onclick="delInc(${i})">&#x2715;</button></div>
        </div>`).join('');

    const listExp = document.getElementById('listExp');
    listExp.innerHTML = data.exp.length === 0
      ? '<div class="empty">Nenhuma despesa registrada</div>'
      : data.exp.map((it,i) => `<div class="item">
          <div class="item-left"><span class="item-tag tag-${it.cat}">${CAT_LABELS[CATS.indexOf(it.cat)]}</span><span class="item-name">${escHtml(it.name)}</span></div>
          <div class="item-right"><span class="item-amount exp">${fmt(it.amount)}</span><button class="del-btn" onclick="delExp(${i})">&#x2715;</button></div>
        </div>`).join('');

    renderCharts(data, totalInc, totalExp);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderCharts(data, totalInc, totalExp) {
    const catTotals = CATS.map(c => data.exp.filter(e => e.cat === c).reduce((s,i) => s + i.amount, 0));
    if(catChartInst) { catChartInst.destroy(); catChartInst = null; }
    if(barChartInst) { barChartInst.destroy(); barChartInst = null; }

    catChartInst = new Chart(document.getElementById('catChart'), {
      type: 'doughnut',
      data: {
        labels: CAT_LABELS,
        datasets: [{ data: catTotals, backgroundColor: CAT_COLORS, borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 10, color: '#888780' } },
          tooltip: { callbacks: { label: c => ' ' + fmt(c.raw) } }
        }
      }
    });

    barChartInst = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: ['Receitas', 'Despesas'],
        datasets: [{
          data: [totalInc, totalExp],
          backgroundColor: [INC_COLOR, EXP_COLOR],
          borderRadius: 6, borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + fmt(c.raw) } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#888780' } },
          y: { grid: { color: 'rgba(128,128,120,0.15)' }, ticks: { color: '#888780', callback: v => 'R$ ' + v.toLocaleString('pt-BR') } }
        }
      }
    });
  }

  window.delInc = function(i) { const d=load(); d.inc.splice(i,1); save(d); render(); };
  window.delExp = function(i) { const d=load(); d.exp.splice(i,1); save(d); render(); };

  document.getElementById('prevMonth').onclick = () => { month--; if(month<0){month=11;year--;} render(); };
  document.getElementById('nextMonth').onclick = () => { month++; if(month>11){month=0;year++;} render(); };

  document.getElementById('toggleInc').onclick = () => document.getElementById('formInc').classList.toggle('hidden');
  document.getElementById('toggleExp').onclick = () => document.getElementById('formExp').classList.toggle('hidden');

  document.getElementById('saveInc').onclick = () => {
    const name = document.getElementById('incName').value.trim();
    const amount = parseFloat(document.getElementById('incAmount').value);
    if(!name || isNaN(amount) || amount <= 0) return;
    const d = load(); d.inc.push({name, amount}); save(d);
    document.getElementById('incName').value = '';
    document.getElementById('incAmount').value = '';
    document.getElementById('formInc').classList.add('hidden');
    render();
  };

  document.getElementById('saveExp').onclick = () => {
    const name = document.getElementById('expName').value.trim();
    const amount = parseFloat(document.getElementById('expAmount').value);
    const cat = document.getElementById('expCat').value;
    if(!name || isNaN(amount) || amount <= 0) return;
    const d = load(); d.exp.push({name, amount, cat}); save(d);
    document.getElementById('expName').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('formExp').classList.add('hidden');
    render();
  };

  document.getElementById('incAmount').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('saveInc').click(); });
  document.getElementById('expAmount').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('saveExp').click(); });

  render();
</script>
</body>
</html>
